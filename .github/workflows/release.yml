name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: adit-code_linux_amd64
            cflags: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: adit-code_darwin_arm64
            cflags: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: adit-code_darwin_amd64
            cflags: "-arch x86_64"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_CFLAGS: ${{ matrix.cflags }}
          CGO_LDFLAGS: ${{ matrix.cflags }}
        run: |
          go build -trimpath -ldflags="-s -w" -o adit ./cmd/adit
          tar czf ${{ matrix.artifact }}.tar.gz adit
          if command -v sha256sum &>/dev/null; then sha256sum ${{ matrix.artifact }}.tar.gz; else shasum -a 256 ${{ matrix.artifact }}.tar.gz; fi > ${{ matrix.artifact }}.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "adit-code ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
